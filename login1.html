<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K.L.N College of Engineering - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#003366,#0066cc);
}

.login-box{
    width:400px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    text-align:center;
}

.logo{
    width:130px;
    height:130px;
    display:block;
    margin:0 auto 15px;
    object-fit:contain;
}

h2{
    color:#003366;
    margin-bottom:25px;
}

.input-box{
    width:100%;
    margin:15px 0;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

.input-box input:focus{
    border-color:#0056b3;
    box-shadow:0 0 8px rgba(0,86,179,0.3);
}

.login-btn{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#0056b3;
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:#666;
}
</style>

</head>

<body>

<div class="login-box">

    <img src="76afe533-e722-4df9-a39b-68a087cfc399.png" alt="College Logo" class="logo">

    <h2>K.L.N College of Engineering</h2>

    <form>

        <div class="input-box">
            <input type="text" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>

    </form>

    <div class="footer">
        © 2026 K.L.N College of Engineering
    </div>

</div>

</body>
</html>
