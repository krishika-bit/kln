<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K.L.N College of Engineering - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#003366,#0066cc);
}

.login-box{
    width:400px;
    background:white;
    padding:35px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.logo{
    width:140px;
    height:140px;
    display:block;
    margin:0 auto 15px;
}

h2{
    color:#003366;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.footer{
    margin-top:20px;
    color:#666;
    font-size:13px;
}
</style>

</head>
<body>

<div class="login-box">

    <img src="KLN-removebg-preview.png" alt="College Logo" class="logo">

    <h2>K.L.N College of Engineering</h2>

    <form>
        <input type="text" placeholder="Username" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        © 2026 K.L.N College of Engineering
    </div>

</div>

</body>
</html>
